<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Quiz</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}
.container {
  background: white;
  width: 320px;
  margin: 50px auto;
  padding: 20px;
  border-radius: 10px;
}
button {
  display: block;
  margin: 8px auto;
  padding: 10px;
  width: 80%;
}
</style>
</head>
<body>

<div class="container">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <button onclick="nextQuestion()">Suivant</button>
</div>

<script>
const quiz = [
  {
    question: "Quelle est la capitale de la France ?",
    answers: ["Paris", "Lyon", "Marseille"],
    correct: 0
  },
  {
    question: "Combien font 2 + 2 ?",
    answers: ["3", "4", "5"],
    correct: 1
  },
  {
    question: "Quel animal miaule ?",
    answers: ["Chien", "Chat", "Vache"],
    correct: 1
  }
];

let current = 0;
let score = 0;

function loadQuestion() {
  const q = quiz[current];
  document.getElementById("question").innerText = q.question;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.answers.forEach((a, i) => {
    const btn = document.createElement("button");
    btn.innerText = a;
    btn.onclick = () => checkAnswer(i);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(i) {
  if (i === quiz[current].correct) {
    score++;
    alert("Bonne réponse !");
  } else {
    alert("Mauvaise réponse !");
  }
}

function nextQuestion() {
  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    document.body.innerHTML = `
      <h1>Quiz terminé</h1>
      <h2>Score : ${score}/${quiz.length}</h2>
      <button onclick="location.reload()">Recommencer</button>
    `;
  }
}

loadQuestion();
</script>

</body>
</html>
