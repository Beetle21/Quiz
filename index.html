<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Histoire</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f2f2f2;
}

.box {
  background: white;
  width: 420px;
  margin: 50px auto;
  padding: 20px;
  border-radius: 10px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 90%;
}
</style>

</head>
<body>

<div class="box">
  <h4 id="level"></h4>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <button onclick="nextQuestion()">Suivant</button>
</div>

<script>

function goodSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.value = 800;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 150);
}

function badSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "square";
  osc.frequency.value = 200;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 200);
}

const quiz = [
  { level: 1, question: "Quel pays est opposé à la France ?", answers: ["Angleterre","Espagne","Italie"], correct: 0 },
  { level: 1, question: "Jeanne d’Arc aide qui ?", answers: ["Charles VII","Louis XIV","Napoléon"], correct: 0 },

  { level: 2, question: "Dynastie en France ?", answers: ["Valois","Bourbon","Capétiens"], correct: 0 },
  { level: 2, question: "Bertrand du Guesclin ?", answers: ["oui","non","peut-être"], correct: 0 },

  { level: 3, question: "Dynastie anglaise ?", answers: ["Plantagenêt","Tudor","Stuart"], correct: 0 },
  { level: 3, question: "Roi capturé Poitiers ?", answers: ["Jean II","Charles V","Philippe VI"], correct: 0 },

  { level: 4, question: "Dernière bataille ?", answers: ["Castillon","Azincourt","Bouvines"], correct: 0 },
  { level: 4, question: "Sacre de Charles VII ?", answers: ["1429","1431","1453"], correct: 0 }
];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  answered = false;

  const q = quiz[current];
  document.getElementById("level").innerText = "Niveau " + q.level;
  document.getElementById("question").innerText = q.question;

  const div = document.getElementById("answers");
  div.innerHTML = "";

  q.answers.forEach((a, i) => {
    const btn = document.createElement("button");
    btn.innerText = a;

    btn.onclick = () => {
      if (answered) return;
      answered = true;

      if (i === q.correct) {
        score++;
        btn.style.background = "lightgreen";
        goodSound();
      } else {
        btn.style.background = "salmon";
        badSound();
      }
    };

    div.appendChild(btn);
  });
}

function nextQuestion() {
  if (!answered) {
    alert("Réponds d'abord !");
    return;
  }

  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    document.body.innerHTML = `
      <div class="box">
        <h1>🎮 Quiz terminé</h1>
        <h2>Score : ${score}/${quiz.length}</h2>
        <button onclick="location.reload()">Rejouer</button>
      </div>
    `;
  }
}

loadQuestion();

</script>

</body>
</html>
