<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}

.box {
  background: white;
  width: 320px;
  margin: 60px auto;
  padding: 20px;
  border-radius: 10px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 80%;
}
</style>
</head>
<body>

<div class="box">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<script>
const quiz = [
  {
    question: "Quelle est la capitale de la France ?",
    answers: ["Paris", "Lyon", "Marseille"],
    correct: 0
  },
  {
    question: "Combien font 2 + 2 ?",
    answers: ["3", "4", "5"],
    correct: 1
  },
  {
    question: "Quel animal miaule ?",
    answers: ["Chien", "Chat", "Vache"],
    correct: 1
  }
];

let current = 0;
let score = 0;
let locked = false;

function load() {
  locked = false;

  const q = quiz[current];
  document.getElementById("question").innerText = q.question;

  const div = document.getElementById("answers");
  div.innerHTML = "";

  q.answers.forEach((a, i) => {
    const btn = document.createElement("button");
    btn.innerText = a;

    btn.onclick = () => {
      if (locked) return;
      locked = true;

      if (i === q.correct) {
        score++;
        btn.style.background = "lightgreen";
      } else {
        btn.style.background = "salmon";
      }

      setTimeout(next, 800);
    };

    div.appendChild(btn);
  });
}

function next() {
  current++;

  if (current < quiz.length) {
    load();
  } else {
    document.body.innerHTML = `
      <div class="box">
        <h1>Quiz terminé</h1>
        <h2>Score : ${score}/${quiz.length}</h2>
        <button onclick="location.reload()">Recommencer</button>
      </div>
    `;
  }
}

load();
</script>

</body>
</html>
