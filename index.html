<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Histoire</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f2f2f2;
}

.box {
  background: white;
  width: 430px;
  margin: 50px auto;
  padding: 20px;
  border-radius: 10px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 90%;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="box">
  <h4 id="level"></h4>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <button onclick="nextQuestion()">Suivant</button>
</div>

<script>

let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// 🔔 Bonne réponse (ding type quiz moderne)
function goodSound() {
  initAudio();

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc1.type = "sine";
  osc2.type = "sine";

  osc1.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc2.frequency.setValueAtTime(1200, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);

  osc1.start();
  osc2.start();

  osc1.stop(audioCtx.currentTime + 0.2);
  osc2.stop(audioCtx.currentTime + 0.2);
}

// ❌ Mauvaise réponse (buzz doux)
function badSound() {
  initAudio();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "triangle";
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.25);

  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

const quiz = [
  // 🔵 Niveau 1
  {
    level: 1,
    question: "Quel pays est opposé à la France durant la guerre de Cent Ans ?",
    answers: ["Angleterre", "Espagne", "Saint-Empire romain germanique"],
    correct: 0
  },
  {
    level: 1,
    question: "Surnommée « la pucelle d’Orléans », quelle jeune femme aide Charles VII à reconquérir le trône ?",
    answers: ["Jeanne d'Arc", "Aliénor d'Aquitaine", "Blanche de Castille"],
    correct: 0
  },

  // 🟢 Niveau 2
  {
    level: 2,
    question: "Quelle dynastie royale est au pouvoir en France durant ce conflit ?",
    answers: ["Valois", "Bourbon", "Capétiens directs"],
    correct: 0
  },
  {
    level: 2,
    question: "Prénommé Bertrand, quel noble breton, futur connétable, fut un solide appui de Charles V ?",
    answers: ["Bertrand du Guesclin", "Bertrand de Goth", "Bertrand Russell"],
    correct: 0
  },

  // 🟡 Niveau 3
  {
    level: 3,
    question: "Quelle dynastie royale est au pouvoir en Angleterre au début de la guerre de Cent Ans ?",
    answers: ["Plantagenêt", "Tudor", "Stuart"],
    correct: 0
  },
  {
    level: 3,
    question: "Quel roi est fait prisonnier par les Anglais lors de la bataille de Poitiers en 1356 ?",
    answers: ["Jean II le Bon", "Charles V", "Philippe VI"],
    correct: 0
  },

  // 🔴 Niveau 4
  {
    level: 4,
    question: "Quelle bataille ayant eu lieu le 17 juillet 1453 est traditionnellement considérée comme la dernière du conflit ?",
    answers: ["Castillon", "Azincourt", "Bouvines"],
    correct: 0
  },
  {
    level: 4,
    question: "En quelle année Charles VII est-il sacré roi à Reims ?",
    answers: ["1429", "1431", "1453"],
    correct: 0
  }
];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  answered = false;

  const q = quiz[current];
  document.getElementById("level").innerText = "Niveau " + q.level;
  document.getElementById("question").innerText = q.question;

  const div = document.getElementById("answers");
  div.innerHTML = "";

  q.answers.forEach((a, i) => {
    const btn = document.createElement("button");
    btn.innerText = a;

    btn.onclick = () => {
      if (answered) return;
      answered = true;

      if (i === q.correct) {
        score++;
        btn.style.background = "lightgreen";
        goodSound();
      } else {
        btn.style.background = "salmon";
        badSound();
      }
    };

    div.appendChild(btn);
  });
}

function nextQuestion() {
  if (!answered) {
    alert("Réponds d'abord !");
    return;
  }

  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    document.body.innerHTML = `
      <div class="box">
        <h1>🎮 Quiz terminé</h1>
        <h2>Score : ${score}/${quiz.length}</h2>
        <button onclick="location.reload()">Rejouer</button>
      </div>
    `;
  }
}

loadQuestion();

</script>

</body>
</html>
