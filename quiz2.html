<script>

let current = 0;
let score = 0;
let answered = false;
let order = [];

let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function goodSound() {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function badSound() {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "triangle";
  osc.frequency.setValueAtTime(250, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

// 🔀 mélange des réponses
function shuffle(array) {
  return array
    .map(v => ({ v, sort: Math.random() }))
    .sort((a,b) => a.sort - b.sort)
    .map(({v}) => v);
}

// 🎮 QUIZ
const quiz = [
  {
    level: 1,
    question: "Quel pays est opposé à la France durant la guerre de Cent Ans ?",
    answers: ["Angleterre", "Espagne", "Saint-Empire romain germanique"],
    correctAnswer: "Angleterre"
  },
  {
    level: 1,
    question: "Surnommée « la pucelle d’Orléans », quelle jeune femme aide Charles VII ?",
    answers: ["Jeanne d'Arc", "Aliénor d'Aquitaine", "Blanche de Castille"],
    correctAnswer: "Jeanne d'Arc"
  },
  {
    level: 2,
    question: "Quelle dynastie royale est au pouvoir en France durant ce conflit ?",
    answers: ["Valois", "Bourbon", "Capétiens directs"],
    correctAnswer: "Valois"
  },
  {
    level: 2,
    question: "Bertrand du Guesclin était :",
    answers: ["Connétable", "Roi", "Pape"],
    correctAnswer: "Connétable"
  },
  {
    level: 3,
    question: "Dynastie anglaise au début de la guerre de Cent Ans ?",
    answers: ["Plantagenêt", "Tudor", "Stuart"],
    correctAnswer: "Plantagenêt"
  },
  {
    level: 3,
    question: "Quel roi est capturé à Poitiers en 1356 ?",
    answers: ["Jean II le Bon", "Charles V", "Philippe VI"],
    correctAnswer: "Jean II le Bon"
  },
  {
    level: 4,
    question: "Dernière bataille de la guerre de Cent Ans ?",
    answers: ["Castillon", "Azincourt", "Bouvines"],
    correctAnswer: "Castillon"
  },
  {
    level: 4,
    question: "Sacre de Charles VII ?",
    answers: ["1429", "1431", "1453"],
    correctAnswer: "1429"
  }
];

// 🔀 mélange questions
function initOrder() {
  order = [...Array(quiz.length).keys()];
  order.sort(() => Math.random() - 0.5);
}

function loadQuestion() {
  answered = false;
  document.getElementById("nextBtn").style.display = "none";

  const q = quiz[order[current]];

  document.getElementById("level").innerText = "Niveau " + q.level;
  document.getElementById("question").innerText = q.question;

  const div = document.getElementById("answers");
  div.innerHTML = "";

  const shuffled = shuffle(q.answers);

  shuffled.forEach(a => {
    const btn = document.createElement("button");
    btn.innerText = a;
    btn.classList.add("answer");

    btn.onclick = () => {
      if (answered) return;
      answered = true;

      document.querySelectorAll(".answer").forEach(b => b.disabled = true);

      if (a === q.correctAnswer) {
        btn.classList.add("correct");
        score++;
        goodSound();
      } else {
        btn.classList.add("wrong");
        badSound();
      }

      document.getElementById("score").innerText = "Score : " + score;
      document.getElementById("nextBtn").style.display = "block";
    };

    div.appendChild(btn);
  });
}

function nextQuestion() {
  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    let message = "";

    if (score === quiz.length) {
      message = "🏆 Parfait ! Tu maîtrises la guerre de Cent Ans";
    } else if (score >= quiz.length / 2) {
      message = "👍 Pas mal ! Tu connais l’essentiel";
    } else {
      message = "📚 À revoir un peu !";
    }

    document.querySelector(".box").innerHTML = `
      <h1>🎮 Quiz terminé</h1>
      <h2>${message}</h2>
      <h2>Score : ${score}/${quiz.length}</h2>
      <button onclick="location.reload()">Rejouer</button>
    `;
  }
}

initOrder();
loadQuestion();

</script>
