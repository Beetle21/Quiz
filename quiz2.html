<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz 2 - Histoire (Upgrade)</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #e9ecef;
}

.box {
  background: white;
  width: 450px;
  margin: 50px auto;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 20px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

.answer-btn {
  background: #f1f3f5;
}

.answer-btn:hover {
  background: #dee2e6;
}

.correct {
  background: #4caf50 !important;
  color: white;
}

.wrong {
  background: #e74c3c !important;
  color: white;
}

#nextBtn {
  background: #007bff;
  color: white;
  display: none;
}

#score {
  margin-top: 10px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="box">
  <h4 id="level"></h4>
  <h2 id="question"></h2>
  <div id="answers"></div>

  <button id="nextBtn" onclick="nextQuestion()">Suivant</button>

  <div id="score">Score : 0</div>
</div>

<script>

let current = 0;
let score = 0;
let answered = false;

// 🔊 sons simples
let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function goodSound() {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(900, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function badSound() {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "triangle";
  osc.frequency.setValueAtTime(250, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

// 🎲 shuffle réponses
function shuffle(array) {
  return array
    .map(v => ({ v, sort: Math.random() }))
    .sort((a,b) => a.sort - b.sort)
    .map(({v}) => v);
}

// 🎮 QUIZ 2 (tes questions)
const quiz = [
  {
    level: 1,
    question: "Quel pays est opposé à la France durant la guerre de Cent Ans ?",
    answers: ["Angleterre", "Espagne", "Saint-Empire romain germanique"],
    correctAnswer: "Angleterre"
  },
  {
    level: 1,
    question: "Surnommée « la pucelle d’Orléans », quelle jeune femme aide Charles VII ?",
    answers: ["Jeanne d'Arc", "Aliénor d'Aquitaine", "Blanche de Castille"],
    correctAnswer: "Jeanne d'Arc"
  },
  {
    level: 2,
    question: "Quelle dynastie royale est au pouvoir en France durant ce conflit ?",
    answers: ["Valois", "Bourbon", "Capétiens directs"],
    correctAnswer: "Valois"
  },
  {
    level: 2,
    question: "Quel noble breton, futur connétable, soutient Charles V ?",
    answers: ["Bertrand du Guesclin", "Bertrand de Goth", "Bertrand Russell"],
    correctAnswer: "Bertrand du Guesclin"
  },
  {
    level: 3,
    question: "Dynastie anglaise au début de la guerre de Cent Ans ?",
    answers: ["Plantagenêt", "Tudor", "Stuart"],
    correctAnswer: "Plantagenêt"
  },
  {
    level: 3,
    question: "Quel roi est fait prisonnier à Poitiers (1356) ?",
    answers: ["Jean II le Bon", "Charles V", "Philippe VI"],
    correctAnswer: "Jean II le Bon"
  },
  {
    level: 4,
    question: "Dernière bataille de la guerre de Cent Ans (1453) ?",
    answers: ["Castillon", "Azincourt", "Bouvines"],
    correctAnswer: "Castillon"
  },
  {
    level: 4,
    question: "Année du sacre de Charles VII ?",
    answers: ["1429", "1431", "1453"],
    correctAnswer: "1429"
  }
];

function loadQuestion() {
  answered = false;
  document.getElementById("nextBtn").style.display = "none";

  const q = quiz[current];

  document.getElementById("level").innerText = "Niveau " + q.level;
  document.getElementById("question").innerText = q.question;

  const div = document.getElementById("answers");
  div.innerHTML = "";

  const shuffled = shuffle(q.answers);

  shuffled.forEach(a => {
    const btn = document.createElement("button");
    btn.innerText = a;
    btn.classList.add("answer-btn");

    btn.onclick = () => {
      if (answered) return;
      answered = true;

      document.querySelectorAll(".answer-btn").forEach(b => b.disabled = true);

      if (a === q.correctAnswer) {
        btn.classList.add("correct");
        score++;
        goodSound();
      } else {
        btn.classList.add("wrong");
        badSound();
      }

      document.getElementById("score").innerText = "Score : " + score;
      document.getElementById("nextBtn").style.display = "block";
    };

    div.appendChild(btn);
  });
}

function nextQuestion() {
  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    document.querySelector(".box").innerHTML = `
      <h1>🎮 Quiz terminé</h1>
      <h2>Score final : ${score}/${quiz.length}</h2>
      <button onclick="location.reload()">Rejouer</button>
    `;
  }
}

loadQuestion();

</script>

</body>
</html>
